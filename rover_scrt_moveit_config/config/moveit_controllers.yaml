# MoveIt uses this configuration for controller management

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager
use_sim_time: true

moveit_simple_controller_manager:
  controller_names:
    - scara_controller
    - gripper_controller

  scara_controller:
    type: FollowJointTrajectory
    joints:
      - sctr_brazo_link_joint
      - sctr_antebrazo_link_joint
      - sctr_muneca_link_joint
      - sctr_mano_link_joint
    action_ns: follow_joint_trajectory
    default: true
    use_sim_time: true
  gripper_controller:
    type: FollowJointTrajectory
    joints:
      - sctr_pinza1_link_joint
      - sctr_pinza2_link_joint
    action_ns: follow_joint_trajectory
    default: true
    use_sim_time: true